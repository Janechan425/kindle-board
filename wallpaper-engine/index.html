<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kindle Board Wallpaper</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #efeee8;
      color: #10100f;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .wallpaper {
      width: 100vw;
      height: 100vh;
      padding: clamp(20px, 2.5vw, 46px);
      background:
        linear-gradient(90deg, rgba(0, 0, 0, .035) 0, rgba(0, 0, 0, 0) 34px),
        #f7f6ef;
      border: clamp(8px, .8vw, 16px) solid #10100f;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: clamp(14px, 1.5vw, 26px);
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 24px;
      padding-bottom: clamp(14px, 1.4vw, 24px);
      border-bottom: 6px double #10100f;
    }

    .date {
      font-size: clamp(30px, 2.4vw, 58px);
      line-height: 1.02;
      text-transform: uppercase;
      font-weight: 800;
    }

    .place {
      text-align: right;
      text-transform: uppercase;
      font-size: clamp(24px, 1.7vw, 42px);
      font-weight: 900;
      line-height: 1;
    }

    .city-select {
      margin-top: 12px;
      max-width: 260px;
      border: 3px solid #10100f;
      background: #fff;
      color: #10100f;
      font: 800 clamp(18px, 1.1vw, 28px) "Trebuchet MS", Arial, sans-serif;
      padding: 3px 8px;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(360px, .65fr);
      gap: clamp(22px, 2.6vw, 48px);
      align-items: stretch;
    }

    .clock {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: clamp(16px, 1.5vw, 34px);
      align-items: center;
    }

    .flip {
      height: clamp(280px, 26vw, 46vh);
      border: clamp(5px, .45vw, 10px) solid #10100f;
      background: #fff;
      box-shadow: clamp(8px, .8vw, 16px) clamp(8px, .8vw, 16px) 0 #10100f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .flip:after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      border-top: clamp(3px, .28vw, 6px) solid #10100f;
    }

    .digit {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(210px, 15.8vw, 39vh);
      line-height: 1;
      font-weight: 900;
      color: #080808;
      transform: translateY(-.02em);
    }

    .colon {
      width: clamp(32px, 2.6vw, 60px);
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: min(9vw, 22vh);
      line-height: 1;
      font-weight: 900;
    }

    .side {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: clamp(20px, 2vw, 34px);
      border-left: 6px solid #10100f;
      padding-left: clamp(22px, 2.2vw, 44px);
    }

    .label {
      display: block;
      margin-bottom: 12px;
      border-bottom: 3px solid #10100f;
      font-size: clamp(18px, 1.05vw, 26px);
      font-weight: 900;
      text-transform: uppercase;
    }

    .weather-main {
      font-size: clamp(84px, 7vw, 160px);
      line-height: .9;
      font-weight: 900;
      margin: 0 0 16px;
    }

    .weather-note {
      font-size: clamp(28px, 2.1vw, 46px);
      line-height: 1.2;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .rain {
      display: inline-block;
      border: 4px solid #10100f;
      padding: 6px 12px;
      font-size: clamp(22px, 1.45vw, 34px);
      font-weight: 900;
      background: #fff;
    }

    .forecast {
      align-self: end;
      border-top: 5px solid #10100f;
      padding-top: 18px;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border-top: 3px solid #10100f;
      border-left: 3px solid #10100f;
      background: #fff;
    }

    .day {
      min-width: 0;
      padding: clamp(9px, .9vw, 18px) 6px;
      border-right: 3px solid #10100f;
      border-bottom: 3px solid #10100f;
      text-align: center;
    }

    .day-name {
      display: block;
      font-size: clamp(15px, .9vw, 24px);
      font-weight: 900;
    }

    .day-temp {
      display: block;
      margin-top: 4px;
      font-size: clamp(18px, 1.15vw, 30px);
      font-weight: 900;
    }

    .day-rain {
      display: block;
      margin-top: 4px;
      font-size: clamp(13px, .75vw, 20px);
      font-weight: 800;
    }

    .quote {
      border-top: 6px double #10100f;
      padding-top: clamp(14px, 1.6vw, 28px);
      font-family: Georgia, "Times New Roman", "SimSun", serif;
      font-size: clamp(30px, 2.45vw, 58px);
      line-height: 1.12;
      font-weight: 900;
    }

    @media (max-aspect-ratio: 4 / 3) {
      .wallpaper {
        overflow: auto;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .side {
        border-left: 0;
        border-top: 6px solid #10100f;
        padding-left: 0;
        padding-top: 22px;
      }

      .flip {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <main class="wallpaper">
    <header class="top">
      <div class="date" id="dateText">MONDAY<br>JUN 29, 2026</div>
      <div class="place">
        <div id="placeText">KINGSTON</div>
        <select class="city-select" id="citySelect"></select>
      </div>
    </header>

    <section class="main">
      <div class="clock" aria-label="Clock">
        <div class="flip"><div class="digit" id="hourText">--</div></div>
        <div class="colon">:</div>
        <div class="flip"><div class="digit" id="minuteText">--</div></div>
      </div>

      <aside class="side">
        <section>
          <span class="label">Weather</span>
          <div class="weather-main" id="tempText">-- C</div>
          <div class="weather-note" id="weatherText">Loading weather...</div>
          <div class="rain" id="rainText">Rain: --</div>
        </section>

        <section class="forecast">
          <span class="label">7 Day Forecast</span>
          <div class="forecast-grid" id="forecastText"></div>
        </section>
      </aside>
    </section>

    <section class="quote" id="memoText">湖风吹过石灰岩街道。<br>Lake air over limestone streets.</section>
  </main>

  <script>
    var CONFIG = {
      city: "Kingston",
      latitude: 44.2312,
      longitude: -76.4860,
      timeZone: "America/Toronto",
      utcOffsetHours: -4,
      use24Hour: true,
      weatherRefreshMinutes: 30,
      memo: [
        "湖风吹过石灰岩街道。<br>Lake air over limestone streets.",
        "今天也把温柔留给你。<br>Today keeps a little gentleness for you."
      ]
    };

    var CITIES = [
      { name: "Kingston", latitude: 44.2312, longitude: -76.4860, timeZone: "America/Toronto", utcOffsetHours: -4, memo: ["湖风吹过石灰岩街道。<br>Lake air over limestone streets.", "今天也把温柔留给你。<br>Today keeps a little gentleness for you."] },
      { name: "Toronto", latitude: 43.6532, longitude: -79.3832, timeZone: "America/Toronto", utcOffsetHours: -4, memo: ["街车穿过玻璃与湖光。<br>Streetcars through glass and lake light.", "再忙的城市，也有一格时间想你。<br>Even a busy city leaves one square of time for you."] },
      { name: "Boston", latitude: 42.3601, longitude: -71.0589, timeZone: "America/New_York", utcOffsetHours: -4, memo: ["红砖、书页和海港风。<br>Brick, books, and harbor wind.", "把海风和清晨都寄给你。<br>Sending harbor wind and morning light to you."] },
      { name: "Vancouver", latitude: 49.2827, longitude: -123.1207, timeZone: "America/Vancouver", utcOffsetHours: -7, memo: ["山很近，雨很轻。<br>Mountains close, rain soft.", "下雨的时候，也想和你慢慢走。<br>When it rains, I want to walk slowly with you."] },
      { name: "New York", latitude: 40.7128, longitude: -74.0060, timeZone: "America/New_York", utcOffsetHours: -4, memo: ["城市在网格里奔跑。<br>The city runs inside a grid.", "人潮很大，心里只给你留灯。<br>In the crowd, one light stays on for you."] },
      { name: "London", latitude: 51.5072, longitude: -0.1276, timeZone: "Europe/London", utcOffsetHours: 1, memo: ["河流、细雨和旧石头。<br>River, rain, and old stone.", "如果雾起，就把想念写给你。<br>If the fog rises, I write the longing to you."] },
      { name: "Tokyo", latitude: 35.6762, longitude: 139.6503, timeZone: "Asia/Tokyo", utcOffsetHours: 9, memo: ["霓虹有序，巷口安静。<br>Neon ordered, alleys quiet.", "世界很亮，最想看见你。<br>The world is bright; I still want to see you most."] },
      { name: "Shanghai", latitude: 31.2304, longitude: 121.4737, timeZone: "Asia/Shanghai", utcOffsetHours: 8, memo: ["江水转弯，高楼生长。<br>The river bends, towers rise.", "风经过外滩，也会替我想你。<br>The river wind thinks of you for me."] },
      { name: "Changsha", latitude: 28.2282, longitude: 112.9388, timeZone: "Asia/Shanghai", utcOffsetHours: 8, memo: ["湘江边，夜色有热气。<br>By the Xiang River, night keeps its warmth.", "热气腾腾的夜里，最想见你。<br>In the warm night, I miss you most."] },
      { name: "Dongguan", latitude: 23.0207, longitude: 113.7518, timeZone: "Asia/Shanghai", utcOffsetHours: 8, memo: ["南方的雨落在厂房之间。<br>Southern rain falls between factory roofs.", "雨声很近，你也很近。<br>The rain is close, and so are you."] }
    ];

    function pad(n) {
      return n < 10 ? "0" + n : "" + n;
    }

    function dayName(n) {
      return ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][n];
    }

    function monthName(n) {
      return ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"][n];
    }

    function dateFromApiText(text) {
      var parts = text.split("-");
      if (parts.length !== 3) return null;
      return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10), 12, 0, 0);
    }

    function currentMemo(now) {
      var memos = CONFIG.memo;
      if (!memos || !memos.length) return "";
      return memos[now.getDate() % memos.length];
    }

    function getCityTime() {
      var now = new Date();
      try {
        var text = now.toLocaleString("en-US", { timeZone: CONFIG.timeZone });
        var parsed = new Date(text);
        if (!isNaN(parsed.getTime())) return parsed;
      } catch (e) {}

      return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (CONFIG.utcOffsetHours * 3600000));
    }

    function updateClock() {
      var now = getCityTime();
      var h = now.getHours();
      var suffix = "";

      if (!CONFIG.use24Hour) {
        suffix = h >= 12 ? " PM" : " AM";
        h = h % 12;
        if (h === 0) h = 12;
      }

      document.getElementById("hourText").innerHTML = pad(h);
      document.getElementById("minuteText").innerHTML = pad(now.getMinutes());
      document.getElementById("dateText").innerHTML =
        dayName(now.getDay()) + "<br>" + monthName(now.getMonth()) + " " + now.getDate() + ", " + now.getFullYear() + suffix;
      document.getElementById("placeText").innerHTML = CONFIG.city;
      document.getElementById("memoText").innerHTML = currentMemo(now);
    }

    function weatherName(code) {
      if (code === 0) return "Clear";
      if (code === 1 || code === 2 || code === 3) return "Clouds";
      if (code === 45 || code === 48) return "Fog";
      if (code >= 51 && code <= 67) return "Drizzle";
      if (code >= 71 && code <= 77) return "Snow";
      if (code >= 80 && code <= 82) return "Rain";
      if (code >= 95) return "Storm";
      return "Weather";
    }

    function loadWeather() {
      document.getElementById("tempText").innerHTML = "-- C";
      document.getElementById("weatherText").innerHTML = "Loading " + CONFIG.city + "...";
      document.getElementById("rainText").innerHTML = "Rain: --";
      document.getElementById("forecastText").innerHTML = "";

      var url = "https://api.open-meteo.com/v1/forecast?latitude=" +
        CONFIG.latitude + "&longitude=" + CONFIG.longitude +
        "&current=temperature_2m,relative_humidity_2m,weather_code,precipitation" +
        "&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max,precipitation_sum&forecast_days=7&timezone=auto";

      try {
        var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status >= 200 && xhr.status < 300) {
              var data = JSON.parse(xhr.responseText);
              var cur = data.current;
              document.getElementById("tempText").innerHTML = Math.round(cur.temperature_2m) + " C";
              document.getElementById("weatherText").innerHTML =
                weatherName(cur.weather_code) + " / Humidity " + Math.round(cur.relative_humidity_2m) + "%";
              renderRain(cur, data.daily);
              renderForecast(data.daily);
            } else {
              document.getElementById("weatherText").innerHTML = "Weather unavailable";
              document.getElementById("rainText").innerHTML = "Rain: --";
            }
          }
        };
        xhr.open("GET", url, true);
        xhr.send(null);
      } catch (e) {
        document.getElementById("weatherText").innerHTML = "Weather unavailable";
        document.getElementById("rainText").innerHTML = "Rain: --";
      }
    }

    function renderRain(current, daily) {
      var prob = daily && daily.precipitation_probability_max ? daily.precipitation_probability_max[0] : null;
      var sum = daily && daily.precipitation_sum ? daily.precipitation_sum[0] : null;
      var currentRain = current && current.precipitation ? current.precipitation : 0;
      var text = "Rain low";

      if (currentRain > 0) {
        text = "Rain now";
      } else if (prob !== null && prob >= 70) {
        text = "Rain likely " + Math.round(prob) + "%";
      } else if (prob !== null && prob >= 40) {
        text = "Rain possible " + Math.round(prob) + "%";
      } else if (prob !== null) {
        text = "Rain low " + Math.round(prob) + "%";
      }

      if (sum !== null && sum >= 1) {
        text += " / " + Math.round(sum) + " mm";
      }

      document.getElementById("rainText").innerHTML = text;
    }

    function renderForecast(daily) {
      if (!daily || !daily.time || !daily.temperature_2m_max || !daily.temperature_2m_min) {
        document.getElementById("forecastText").innerHTML = "Forecast unavailable";
        return;
      }

      var html = "";
      for (var i = 0; i < daily.time.length && i < 7; i++) {
        var date = dateFromApiText(daily.time[i]);
        var label = i === 0 ? "Today" : "Day " + (i + 1);
        if (i !== 0 && date && !isNaN(date.getTime())) label = dayName(date.getDay()).slice(0, 3);

        var high = Math.round(daily.temperature_2m_max[i]);
        var low = Math.round(daily.temperature_2m_min[i]);
        var prob = daily.precipitation_probability_max ? daily.precipitation_probability_max[i] : null;
        var rain = prob === null ? "" : (prob >= 35 ? "Rain " + Math.round(prob) + "%" : "Dry");

        html += '<div class="day"><span class="day-name">' + label +
          '</span><span class="day-temp">' + low + " - " + high +
          ' C</span><span class="day-rain">' + rain + '</span></div>';
      }

      document.getElementById("forecastText").innerHTML = html;
    }

    function applyCity(city) {
      CONFIG.city = city.name;
      CONFIG.latitude = city.latitude;
      CONFIG.longitude = city.longitude;
      CONFIG.timeZone = city.timeZone;
      CONFIG.utcOffsetHours = city.utcOffsetHours;
      CONFIG.memo = city.memo;
      updateClock();
      loadWeather();
    }

    function findCity(name) {
      for (var i = 0; i < CITIES.length; i++) {
        if (CITIES[i].name.toLowerCase() === String(name).toLowerCase()) return CITIES[i];
      }
      return null;
    }

    function setupCities() {
      var params = new URLSearchParams(window.location.search);
      var saved = params.get("city") || localStorage.getItem("kindleBoardWallpaperCity") || CONFIG.city;
      var initial = findCity(saved) || CITIES[0];
      var select = document.getElementById("citySelect");

      for (var i = 0; i < CITIES.length; i++) {
        var option = document.createElement("option");
        option.value = CITIES[i].name;
        option.innerHTML = CITIES[i].name;
        if (CITIES[i].name === initial.name) option.selected = true;
        select.appendChild(option);
      }

      select.onchange = function () {
        var city = findCity(select.value);
        if (city) {
          localStorage.setItem("kindleBoardWallpaperCity", city.name);
          applyCity(city);
        }
      };

      applyCity(initial);
    }

    setupCities();
    window.setInterval(updateClock, 1000);
    window.setInterval(loadWeather, CONFIG.weatherRefreshMinutes * 60 * 1000);
  </script>
</body>
</html>
